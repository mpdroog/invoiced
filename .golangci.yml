version: "2"

linters:
  enable:
    # Default/essential
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - misspell
    # Security
    - gosec
    # HTTP best practices
    - bodyclose
    - noctx
    # Code quality
    - goconst
    - unconvert
    - unparam
    - prealloc
    # Error handling
    - errorlint
    - nilerr
    # Style
    - revive
    - predeclared
    - whitespace
    - nakedret
    # Strict - bug catchers
    - rowserrcheck       # Unchecked SQL rows.Err (catches real bugs)
    - sqlclosecheck      # Unclosed SQL rows/statements
    - copyloopvar        # Loop variable capture bugs
    - durationcheck      # time.Duration multiplication issues
    - makezero           # Slice with non-zero initial length
    - fatcontext         # Context misuse in loops
    - reassign           # Package variable reassignment
    # Strict - style
    - usestdlibvars      # Use http.StatusOK instead of 200
    - dupword            # Duplicate words in comments
    - intrange           # Use range over integers (Go 1.22+)

formatters:
  enable:
    - gofmt

linters-settings:
  goconst:
    min-len: 3
    min-occurrences: 3
  nakedret:
    max-func-lines: 30
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
        disabled: true
      - name: increment-decrement
      - name: var-naming
      - name: package-comments
        disabled: true
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
        disabled: true
      - name: unreachable-code
      - name: redefines-builtin-id

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  exclude-rules:
    - path: embed/
      linters:
        - staticcheck
        - gosec
    - path: contrib/
      linters:
        - staticcheck
    - path: "static-src/"
      linters:
        - all

run:
  timeout: 5m
